# 网络接口配置文件
# 示例配置

# 以太网接口 eth0
[[interfaces]]
name = "eth0"
mac_addr = "00:11:22:33:44:55"
ip_addr = "192.168.1.100"
netmask = "255.255.255.0"
gateway = "192.168.1.1"
mtu = 1500
state = "Up"

# 回环接口 lo
[[interfaces]]
name = "lo"
mac_addr = "00:00:00:00:00:00"
ip_addr = "127.0.0.1"
netmask = "255.0.0.0"
state = "Up"
