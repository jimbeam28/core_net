# 网络接口模块配置文件

# 队列配置
[queue]
# 每个接口的接收队列容量
rxq_capacity = 256
# 每个接口的发送队列容量
txq_capacity = 256

# 网络接口配置
[[interfaces]]
name = "eth0"
mac_addr = "00:11:22:33:44:55"
ip_addr = "192.168.1.100"
netmask = "255.255.255.0"
gateway = "192.168.1.1"
mtu = 1500
state = "Up"

[[interfaces]]
name = "lo"
mac_addr = "00:00:00:00:00:00"
ip_addr = "127.0.0.1"
netmask = "255.0.0.0"
state = "Up"
